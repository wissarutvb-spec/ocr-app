workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60  # minutes
    environment:
      flutter: 3.24.0
      java: 17
      groups:
        - google_play  # optional, ถ้าจะ publish

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true

      - name: Build APK
        script: |
          flutter build apk --release --split-per-abi
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com  # แก้เป็น email ของคุณ
        notify:
          success: true
          failure: true
